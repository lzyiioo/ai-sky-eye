<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGradient)" rx="10"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="200" fill="url(#accentGradient)" rx="4"/>

  <!-- Architecture diagram -->
  <g transform="translate(50, 30)">
    <!-- Title -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">Architecture</text>

    <!-- Vision Box -->
    <rect x="0" y="40" width="120" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">👁️ VISION</text>
    <text x="60" y="85" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">OCR • AI Vision</text>

    <!-- Brain Box -->
    <rect x="140" y="40" width="120" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="200" y="65" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">🧠 BRAIN</text>
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Decision • Context</text>

    <!-- Learning Box -->
    <rect x="280" y="40" width="120" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="340" y="65" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">📝 LEARN</text>
    <text x="340" y="85" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Record • Replay</text>

    <!-- Control Box -->
    <rect x="420" y="40" width="120" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="480" y="65" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">🖐️ CONTROL</text>
    <text x="480" y="85" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Mouse • Keyboard</text>

    <!-- Connection arrows -->
    <path d="M 120 70 L 140 70" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 260 70 L 280 70" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 400 70 L 420 70" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Feedback loop -->
    <path d="M 480 100 Q 480 140 300 140 Q 120 140 60 100" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
    <text x="300" y="155" font-family="Arial, sans-serif" font-size="9" fill="#e94560" text-anchor="middle">Learning Loop</text>
  </g>

  <!-- Stats section -->
  <g transform="translate(580, 30)">
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">Stats</text>

    <!-- Stat items -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#0f3460"/>
      <text x="10" y="17" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Modules</text>
      <text x="170" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e94560" text-anchor="end" font-weight="bold">31</text>
    </g>

    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#0f3460"/>
      <text x="10" y="17" font-family="Arial, sans-serif" font-size="11" fill="#aaa">OCR Languages</text>
      <text x="170" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e94560" text-anchor="end" font-weight="bold">7</text>
    </g>

    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#0f3460"/>
      <text x="10" y="17" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Core Features</text>
      <text x="170" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e94560" text-anchor="end" font-weight="bold">6</text>
    </g>

    <g transform="translate(0, 130)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#0f3460"/>
      <text x="10" y="17" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Version</text>
      <text x="170" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e94560" text-anchor="end" font-weight="bold">2.5</text>
    </g>
  </g>
</svg>
