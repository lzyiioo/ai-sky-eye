<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </linearGradient>

    <!-- Filter for glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#e94560" stroke-width="2"/>

  <!-- Decorative ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#e94560" stroke-width="1" opacity="0.2"/>

  <!-- Outer glow -->
  <ellipse cx="100" cy="100" rx="55" ry="35" fill="url(#glowGradient)" filter="url(#glow)"/>

  <!-- Eye shape -->
  <ellipse cx="100" cy="100" rx="50" ry="30" fill="none" stroke="url(#eyeGradient)" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner eye -->
  <ellipse cx="100" cy="100" rx="32" ry="18" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>

  <!-- Pupil -->
  <circle cx="100" cy="100" r="10" fill="url(#eyeGradient)"/>

  <!-- Highlight -->
  <circle cx="96" cy="96" r="3" fill="#fff" opacity="0.9"/>

  <!-- Circuit lines -->
  <line x1="50" y1="100" x2="25" y2="100" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="100" x2="175" y2="100" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="70" x2="100" y2="45" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="130" x2="100" y2="155" stroke="#e94560" stroke-width="2" opacity="0.6"/>

  <!-- Circuit dots -->
  <circle cx="25" cy="100" r="3" fill="#e94560"/>
  <circle cx="175" cy="100" r="3" fill="#e94560"/>
  <circle cx="100" cy="45" r="3" fill="#e94560"/>
  <circle cx="100" cy="155" r="3" fill="#e94560"/>

  <!-- Corner accents -->
  <path d="M 30 30 L 45 30 L 45 45" fill="none" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  <path d="M 170 30 L 155 30 L 155 45" fill="none" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  <path d="M 30 170 L 45 170 L 45 155" fill="none" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  <path d="M 170 170 L 155 170 L 155 155" fill="none" stroke="#e94560" stroke-width="2" opacity="0.5"/>
</svg>
