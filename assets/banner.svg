<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </linearGradient>

    <!-- Filter for glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filter for shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)" rx="20"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#e94560" opacity="0.05"/>
  <circle cx="700" cy="300" r="200" fill="#e94560" opacity="0.05"/>

  <!-- Eye icon group -->
  <g transform="translate(150, 200)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="70" ry="45" fill="url(#glowGradient)" opacity="0.5" filter="url(#glow)"/>

    <!-- Eye shape -->
    <ellipse cx="0" cy="0" rx="60" ry="35" fill="none" stroke="url(#eyeGradient)" stroke-width="3" filter="url(#glow)"/>

    <!-- Inner eye -->
    <ellipse cx="0" cy="0" rx="40" ry="22" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>

    <!-- Pupil -->
    <circle cx="0" cy="0" r="12" fill="url(#eyeGradient)"/>

    <!-- Highlight -->
    <circle cx="-4" cy="-4" r="4" fill="#fff" opacity="0.8"/>

    <!-- Circuit lines -->
    <line x1="-60" y1="0" x2="-90" y2="0" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="0" x2="90" y2="0" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-35" x2="0" y2="-55" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="35" x2="0" y2="55" stroke="#e94560" stroke-width="2" opacity="0.6"/>

    <!-- Circuit dots -->
    <circle cx="-90" cy="0" r="3" fill="#e94560"/>
    <circle cx="90" cy="0" r="3" fill="#e94560"/>
    <circle cx="0" cy="-55" r="3" fill="#e94560"/>
    <circle cx="0" cy="55" r="3" fill="#e94560"/>
  </g>

  <!-- Text: AI Sky Eye -->
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#shadow)">
    AI Sky Eye
  </text>

  <!-- Text: Chinese name -->
  <text x="400" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" fill="#e94560" text-anchor="middle" opacity="0.9">
    AI 天眼通
  </text>

  <!-- Tagline -->
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="18" fill="#aaa" text-anchor="middle">
    Intelligent Windows Desktop Automation
  </text>

  <!-- Feature pills -->
  <g transform="translate(400, 320)">
    <rect x="-280" y="0" width="80" height="28" rx="14" fill="#e94560" opacity="0.2"/>
    <text x="-240" y="19" font-family="Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">AI Vision</text>

    <rect x="-180" y="0" width="100" height="28" rx="14" fill="#e94560" opacity="0.2"/>
    <text x="-130" y="19" font-family="Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">Smart Brain</text>

    <rect x="-60" y="0" width="90" height="28" rx="14" fill="#e94560" opacity="0.2"/>
    <text x="-15" y="19" font-family="Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">Learning</text>

    <rect x="50" y="0" width="90" height="28" rx="14" fill="#e94560" opacity="0.2"/>
    <text x="95" y="19" font-family="Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">31 Modules</text>

    <rect x="160" y="0" width="120" height="28" rx="14" fill="#e94560" opacity="0.2"/>
    <text x="220" y="19" font-family="Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">Voice Control</text>
  </g>

  <!-- Version badge -->
  <rect x="680" y="20" width="90" height="28" rx="14" fill="#e94560"/>
  <text x="725" y="39" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">v2.5</text>
</svg>
